<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <rect width="1280" height="720" fill="#041A22"/>
    <defs>
        <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00d2ff"/>
            <stop offset="100%" stop-color="#3a7bd5"/>
        </linearGradient>
    </defs>
    <!-- Grid -->
    <path d="M0 100 L1280 100 M0 200 L1280 200 M0 300 L1280 300 M0 400 L1280 400 M0 500 L1280 500 M0 600 L1280 600 M100 0 L100 720 M200 0 L200 720 M300 0 L300 720 M400 0 L400 720 M500 0 L500 720 M600 0 L600 720 M700 0 L700 720 M800 0 L800 720 M900 0 L900 720 M1000 0 L1000 720 M1100 0 L1100 720 M1200 0 L1200 720" stroke="#00d2ff" stroke-opacity="0.05" stroke-width="1"/>
    
    <!-- Hero Text -->
    <text x="80" y="260" font-family="sans-serif" font-weight="800" font-size="64" fill="#ffffff">Database</text>
    <text x="80" y="330" font-family="sans-serif" font-weight="800" font-size="64" fill="#ffffff">Synapses</text>
    <text x="80" y="400" font-family="sans-serif" font-weight="600" font-size="32" fill="url(#cyanGrad)">Live SQL &amp; Schema Awareness</text>
    <text x="80" y="460" font-family="sans-serif" font-weight="400" font-size="20" fill="#8caab4">UtterIDE connects securely to your local Postgres/MySQL.</text>
    <text x="80" y="490" font-family="sans-serif" font-weight="400" font-size="20" fill="#8caab4">It reads tables, validates SQL queries, and generates migrations.</text>
    
    <!-- Visual Element -->
    <rect x="680" y="150" width="540" height="420" rx="16" fill="#05232d" stroke="url(#cyanGrad)" stroke-width="2" stroke-opacity="0.5"/>
    <rect x="680" y="150" width="540" height="40" rx="16" fill="#021519"/>
    <rect x="680" y="170" width="540" height="20" fill="#021519"/>
    
    <circle cx="710" cy="170" r="6" fill="#ff5f56"/>
    <circle cx="730" cy="170" r="6" fill="#ffbd2e"/>
    <circle cx="750" cy="170" r="6" fill="#27c93f"/>
    <text x="780" y="175" font-family="sans-serif" font-size="14" fill="#8caab4">schema_validator.ts</text>
    
    <text x="710" y="240" font-family="monospace" font-size="18" fill="#e040fb">AI Action: Query Database</text>
    <text x="710" y="290" font-family="monospace" font-size="16" fill="#00d2ff">SELECT column_name, data_type</text>
    <text x="710" y="320" font-family="monospace" font-size="16" fill="#00d2ff">FROM information_schema.columns</text>
    <text x="710" y="350" font-family="monospace" font-size="16" fill="#00d2ff">WHERE table_name = 'users';</text>
    
    <text x="710" y="400" font-family="monospace" font-size="16" fill="#8caab4">Result: 4 columns found.</text>
    <text x="710" y="430" font-family="monospace" font-size="16" fill="#ffffff">Generating Prisma schema mapping...</text>
    <text x="710" y="470" font-family="monospace" font-size="18" fill="#27c93f">✅ Schema matched perfectly.</text>
</svg>
